version: '3.8'

services:
  torrents-bot:
    build: .
    container_name: torrents-bot
    restart: unless-stopped
    environment:
      - QBITTORRENT_HOST=${QBITTORRENT_HOST:-localhost}
      - QBITTORRENT_PORT=${QBITTORRENT_PORT:-8080}
      - QBITTORRENT_USERNAME=${QBITTORRENT_USERNAME:-admin}
      - QBITTORRENT_PASSWORD=${QBITTORRENT_PASSWORD:-admin}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - ADMIN_CHAT_ID=${ADMIN_CHAT_ID}
      - TRUSTED_USERS_IDS=${TRUSTED_USERS_IDS}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DEBUG=${DEBUG:-False}

  cron-restart:
    image: alpine:latest
    container_name: cron-restart
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      sh -c "
        apk add --no-cache docker-cli &&
        echo '0 3 * * * docker restart torrents-bot' | crontab - &&
        crond -f
      "
